services:
  # 1. Evolution API Engine (Using MongoDB Atlas)
  evolution-api:
    image: atendai/evolution-api:v1.8.7
    platform: linux/amd64
    container_name: evolution-api-container
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./evolution_data:/evolution/instances
      - ./evolution.env:/evolution/.env
    env_file:
      - ./evolution.env
    environment:
      - DOCKER_ENV=true

  # 2. CRM Backend
  crm-backend:
    build: ./backend
    container_name: crm-backend-container
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - EVO_URL=http://evolution-api:8080
      - API_KEY=your_secure_api_key
      - PORT=3000
    depends_on:
      - evolution-api
    restart: always

  # 3. CRM Frontend
  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: frontend-container
    ports:
      - "5173:80"
    depends_on:
      - crm-backend
    restart: always
