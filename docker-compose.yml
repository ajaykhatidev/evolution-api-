services:
  # 1. Evolution API Engine
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api-container
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=your_secure_api_key
      - LOG_LEVEL=ERROR
      - STORE_MESSAGES=true
    restart: always

  # 2. Your CRM Backend
  crm-backend:
    build: ./backend
    container_name: crm-backend-container
    ports:
      - "3000:3000"
    environment:
      - EVO_URL=http://evolution-api:8080
      - API_KEY=your_secure_api_key
      - PORT=3000
    depends_on:
      - evolution-api
    restart: always
