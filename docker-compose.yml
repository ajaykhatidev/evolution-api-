version: '3.9'

services:
  # 0. Local PostgreSQL (for Evolution API)
  db:
    image: postgres:15
    container_name: whatsapp-crm-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # 1. Evolution API Engine
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution-api-container
    ports:
      - "8080:8080"
    volumes:
      - ./evolution_data:/evolution/instances
      - ./evolution.env:/evolution/.env
    env_file:
      - ./evolution.env
    environment:
      - DOCKER_ENV=true
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # 2. CRM Backend
  crm-backend:
    build: ./backend
    container_name: crm-backend-container
    ports:
      - "3000:3000"
    environment:
      - EVO_URL=http://evolution-api:8080
      - API_KEY=your_secure_api_key
      - PORT=3000
    depends_on:
      - evolution-api
    restart: always

  # 3. CRM Frontend
  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "80:80"
    depends_on:
      - crm-backend
    restart: always

volumes:
  evolution_pgdata:
